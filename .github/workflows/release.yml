name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: dotnet-sdk-tui-linux-x64.tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            artifact: dotnet-sdk-tui-linux-arm64.tar.gz
          - os: macos-latest
            rid: osx-arm64
            artifact: dotnet-sdk-tui-osx-arm64.tar.gz
          - os: macos-13
            rid: osx-x64
            artifact: dotnet-sdk-tui-osx-x64.tar.gz
          - os: windows-latest
            rid: win-x64
            artifact: dotnet-sdk-tui-win-x64.zip
          - os: windows-latest
            rid: win-arm64
            artifact: dotnet-sdk-tui-win-arm64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish NativeAOT
        run: >
          dotnet publish src/DotnetSdkTui/DotnetSdkTui.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --output publish/${{ matrix.rid }}
          /p:PublishAot=true

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd publish/${{ matrix.rid }}
          chmod +x dotnet-sdk-tui
          tar -czf ../../${{ matrix.artifact }} dotnet-sdk-tui

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path publish/${{ matrix.rid }}/dotnet-sdk-tui.exe -DestinationPath ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
