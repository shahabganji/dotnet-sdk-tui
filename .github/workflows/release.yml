name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: dotnet-sdk-tui-linux-x64.tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            artifact: dotnet-sdk-tui-linux-arm64.tar.gz
            cross: true
          - os: macos-latest
            rid: osx-arm64
            artifact: dotnet-sdk-tui-osx-arm64.tar.gz
          - os: macos-latest
            rid: osx-x64
            artifact: dotnet-sdk-tui-osx-x64.tar.gz
          - os: windows-latest
            rid: win-x64
            artifact: dotnet-sdk-tui-win-x64.zip
          - os: windows-latest
            rid: win-arm64
            artifact: dotnet-sdk-tui-win-arm64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install cross-compilation toolchain (Linux ARM64)
        if: matrix.cross
        run: |
          sudo dpkg --add-architecture arm64
          # Configure arm64 sources alongside amd64 (Ubuntu 24.04 DEB822 format)
          cat <<'SOURCES' | sudo tee /etc/apt/sources.list.d/arm64-ports.sources
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: noble noble-updates
          Components: main restricted universe
          Architectures: arm64
          SOURCES
          # Restrict existing sources to amd64 only
          for f in /etc/apt/sources.list.d/*.sources; do
            [ "$f" = "/etc/apt/sources.list.d/arm64-ports.sources" ] && continue
            if ! grep -q 'Architectures:' "$f" 2>/dev/null; then
              sudo sed -i '/^Types:/a Architectures: amd64' "$f" || true
            fi
          done
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu zlib1g-dev:arm64

      - name: Determine version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish NativeAOT
        run: >
          dotnet publish src/DotnetSdkTui/DotnetSdkTui.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --output publish/${{ matrix.rid }}
          /p:Version=${{ steps.version.outputs.version }}
          ${{ matrix.cross && '/p:ObjCopyName=aarch64-linux-gnu-objcopy' || '' }}
      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --sign - publish/${{ matrix.rid }}/dotnet-sdk-tui

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd publish/${{ matrix.rid }}
          chmod +x dotnet-sdk-tui
          tar -czf ../../${{ matrix.artifact }} dotnet-sdk-tui

      - name: Sign binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Create a self-signed code signing certificate
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=dsm" -CertStoreLocation Cert:\CurrentUser\My
          # Sign the binary
          Set-AuthenticodeSignature -FilePath publish/${{ matrix.rid }}/dotnet-sdk-tui.exe -Certificate $cert -TimestampServer "http://timestamp.digicert.com"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path publish/${{ matrix.rid }}/dotnet-sdk-tui.exe -DestinationPath ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history + tags to find the previous version

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes (changes since the previous tag)
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current="${GITHUB_REF_NAME}"
          # Previous version by semver order (robust when several tags share one commit,
          # which git-describe-by-ancestry would mislabel).
          previous=$(git tag --sort=-v:refname | awk -v c="$current" 'p==1{print;exit} $0==c{p=1}')
          echo "current=$current previous=${previous:-<none>}"
          if [ -n "$previous" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="$current" -f previous_tag_name="$previous" --jq .body > notes.md
          else
            gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="$current" --jq .body > notes.md
          fi
          cat notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: artifacts/*
